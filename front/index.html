<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мой зелёный уголок</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <nav class="sidebar" aria-label="Основная навигация">
    <div class="sidebar-header">
      <span class="sidebar-leaf" aria-hidden="true"></span>
      <span class="sidebar-title">Мой зелёный<br>уголок</span>
    </div>
    <ul class="sidebar-nav">
      <li><button class="sidebar-link active" data-screen="home"><span class="sidebar-icon"></span>Главная</button></li>
      <li><button class="sidebar-link" data-screen="catalog"><span class="sidebar-icon"></span>Энциклопедия</button></li>
      <li><button class="sidebar-link" data-screen="garden"><span class="sidebar-icon"></span>Мой сад</button></li>
      <li><button class="sidebar-link" data-screen="tasks"><span class="sidebar-icon"></span>Задачи</button></li>
      <li><button class="sidebar-link" data-screen="settings"><span class="sidebar-icon"></span>Настройки</button></li>
    </ul>
  </nav>

  <main class="app-main">

    <section class="screen active" id="screen-home">

      <div class="greeting-card">
        <p class="greeting-text" id="greetingText">Здравствуйте!</p>
        <div class="stats-row">
          <div class="stat-blob">
            <span class="stat-number" id="statTotal">–</span>
            <span class="stat-label">растений в саду</span>
          </div>
          <div class="stat-blob stat-blob--warm">
            <span class="stat-number" id="statNeedsCare">–</span>
            <span class="stat-label">требуют ухода</span>
          </div>
        </div>
      </div>

      <div class="task-columns">
        <section class="block">
          <h2 class="block-title block-title--urgent">Срочно сегодня</h2>
          <div class="task-list" id="urgentTasks">
            <p class="empty-hint">Загрузка…</p>
          </div>
        </section>

        <section class="block">
          <h2 class="block-title">Скоро, завтра</h2>
          <div class="task-list" id="upcomingTasks">
            <p class="empty-hint">Загрузка…</p>
          </div>
        </section>
      </div>

      <section class="block">
        <div class="block-header">
          <h2 class="block-title">Ваши растения</h2>
          <button class="link-btn" data-screen="garden">Весь сад →</button>
        </div>
        <div class="plant-tile-grid" id="recentPlants">
          <p class="empty-hint">Загрузка…</p>
        </div>
      </section>

    </section>

    <section class="screen" id="screen-catalog">
      <div class="stub"><span class="stub-leaf"></span><p>Энциклопедия — следующий шаг</p></div>
    </section>

    <section class="screen" id="screen-garden">
      <div class="stub"><span class="stub-leaf"></span><p>Мой сад — следующий шаг</p></div>
    </section>

    <section class="screen" id="screen-tasks">
      <div class="stub"><span class="stub-leaf"></span><p>Задачи — следующий шаг</p></div>
    </section>

    <section class="screen" id="screen-settings">
      <div class="stub"><span class="stub-leaf"></span><p>Настройки — следующий шаг</p></div>
    </section>

  </main>

  <div class="toast" id="toast"></div>

  <script src="js/state.js"></script>
  <script src="js/api.js"></script>
  <script src="js/screens.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
